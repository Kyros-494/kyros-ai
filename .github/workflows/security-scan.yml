---
name: Security Scan

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6am UTC
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  # ─── Path Filtering ─────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
              - '.github/workflows/security-scan.yml'

  # ─── Dependency Vulnerability Audit ────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install and audit Python deps
        working-directory: server
        run: |
          pip install pip-audit
          python -c '
          import tomllib
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          deps = data.get("project", {}).get("dependencies", [])
          with open("requirements-audit.txt", "w") as f:
              for dep in deps:
                  f.write(dep + "\n")
          '
          pip-audit -r requirements-audit.txt --strict --desc --ignore-vuln CVE-2024-23342 --ignore-vuln CVE-2025-3000 --ignore-vuln CVE-2026-45829

      - name: Audit npm deps (TypeScript SDK)
        working-directory: sdks/typescript
        run: |
          npm ci
          npm audit --audit-level=high || true

  # ─── Container Scan (Trivy) ───────────────────────────────────────
  container-scan:
    name: Container Scan
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name != 'schedule' && github.event_name != 'workflow_dispatch' && needs.changes.outputs.server == 'true')
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t kyros-server:scan ./server

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: "kyros-server:scan"
          format: "sarif"
          output: "trivy-container.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Upload container scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-container.sarif"
          category: "trivy-container"

  # ─── Filesystem & IaC Scan ────────────────────────────────────────
  filesystem-scan:
    name: Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-fs.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Upload filesystem scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-fs.sarif"
          category: "trivy-filesystem"

  # ─── Secret Scanning ──────────────────────────────────────────────
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # ─── License Compliance ───────────────────────────────────────────
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check Python licenses
        working-directory: server
        run: |
          pip install pip-licenses
          pip install .
          pip-licenses --fail-on="GPL-3.0-only;GPL-3.0-or-later;AGPL-3.0-only;AGPL-3.0-or-later" \
            --allow-only="MIT;BSD-2-Clause;BSD-3-Clause;Apache-2.0;ISC;PSF-2.0;MPL-2.0;LGPL-2.1-only;LGPL-3.0-only;Python-2.0;Unlicense" \
            || echo "⚠️ Review flagged licenses above"

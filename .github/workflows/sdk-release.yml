---
name: Publish SDKs

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      sdk:
        description: "SDK to publish"
        required: true
        type: choice
        options:
          - python
          - typescript
          - both

permissions:
  contents: read
  id-token: write

jobs:
  # ─── Python SDK → PyPI ─────────────────────────────────────────────
  publish-python:
    name: Publish Python SDK
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'release' ||
      github.event.inputs.sdk == 'python' ||
      github.event.inputs.sdk == 'both'
    environment:
      name: pypi
      url: https://pypi.org/project/kyros/

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        working-directory: sdks/python
        run: python -m build

      - name: Check package
        working-directory: sdks/python
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdks/python/dist/

  # ─── TypeScript SDK → npm ──────────────────────────────────────────
  publish-typescript:
    name: Publish TypeScript SDK
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'release' ||
      github.event.inputs.sdk == 'typescript' ||
      github.event.inputs.sdk == 'both'
    environment:
      name: npm
      url: https://www.npmjs.com/package/@kyros.494/sdk

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: sdks/typescript
        run: npm ci

      - name: Build
        working-directory: sdks/typescript
        run: npm run build

      - name: Publish to npm
        working-directory: sdks/typescript
        run: npm publish --access public --provenance

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ─── Server: lint + type check + unit tests ───
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint production code (ruff)
        run: uv run ruff check kyros/ alembic/
        
      - name: Lint tests (relaxed rules)
        run: uv run ruff check tests/ --select E,F,W --ignore E501
        continue-on-error: true

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy kyros/

      - name: Unit tests
        run: uv run pytest tests/unit/ -v --tb=short

  # ─── Server: integration tests (needs Postgres + Redis) ───
  server-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: kyros_test
          POSTGRES_USER: kyros
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: server

    env:
      KYROS_DATABASE_URL: postgresql+asyncpg://kyros:test@localhost:5432/kyros_test
      KYROS_REDIS_URL: redis://localhost:6379/0
      KYROS_JWT_SECRET_KEY: ci-test-secret-key-minimum-32-chars
      KYROS_ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Integration tests
        run: uv run pytest tests/integration/ -v --tb=short -m "not slow"

  # ─── Python SDK: lint + type check + tests ───
  sdk-python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check kyros/

      - name: Type check (mypy)
        run: uv run mypy kyros/

      - name: Tests
        run: uv run pytest -v --tb=short
# ─── Typescript SDK: lint + type check + tests ───

  sdk-typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/typescript

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test -- --passWithNoTests
---
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─── Lint & Format ──────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff lint (production)
        run: uv run ruff check kyros/ alembic/

      - name: Ruff lint (tests — relaxed)
        run: uv run ruff check tests/ --select E,F,W --ignore E501

      - name: Ruff format check
        run: uv run ruff format --check .

  # ─── Type Checking ─────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Mypy
        run: uv run mypy kyros/

  # ─── Unit Tests ────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short -q

  # ─── Edge Tests ────────────────────────────────────────────────────
  edge-tests:
    name: Edge Tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run edge tests
        run: uv run pytest tests/edge/ -v --tb=short -q

  # ─── Integration Tests (Postgres + Redis) ──────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, edge-tests]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: kyros_test
          POSTGRES_USER: kyros
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U kyros -d kyros_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: server

    env:
      KYROS_DATABASE_URL: postgresql+asyncpg://kyros:test@localhost:5432/kyros_test
      KYROS_REDIS_URL: redis://localhost:6379/0
      KYROS_JWT_SECRET_KEY: ci-test-secret-key-minimum-32-chars!!
      KYROS_ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Seed test data
        run: uv run python tests/seed_test_tenant.py

      - name: Start server
        run: |
          uv run uvicorn kyros.main:app --host 0.0.0.0 --port 8000 > server.log 2>&1 &
          echo $! > server.pid
          for i in {1..30}; do
            curl -sf http://localhost:8000/health/ready && echo " ✅ Server ready" && exit 0
            sleep 1
          done
          echo "❌ Server failed to start" && cat server.log && exit 1

      - name: Integration tests
        run: >-
          uv run pytest tests/integration/ -v --tb=short -m "not slow"
          --ignore=tests/integration/test_proxy.py

      - name: Upload server logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: server/server.log

  # ─── Python SDK ────────────────────────────────────────────────────
  sdk-python:
    name: Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check kyros/

      - name: Type check
        run: uv run mypy kyros/

  # ─── TypeScript SDK ────────────────────────────────────────────────
  sdk-typescript:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  # ─── CI Summary Gate ──────────────────────────────────────────────
  ci-pass:
    name: CI ✅
    if: always()
    needs: [lint, typecheck, unit-tests, edge-tests, integration-tests, sdk-python, sdk-typescript]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "Typecheck: ${{ needs.typecheck.result }}"
          echo "Unit tests: ${{ needs.unit-tests.result }}"
          echo "Edge tests: ${{ needs.edge-tests.result }}"
          echo "Integration: ${{ needs.integration-tests.result }}"
          echo "SDK Python: ${{ needs.sdk-python.result }}"
          echo "SDK TS: ${{ needs.sdk-typescript.result }}"

          if [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.typecheck.result }}" == "failure" ]] || \
             [[ "${{ needs.unit-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.edge-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.integration-tests.result }}" == "failure" ]]; then
            echo "❌ CI failed"
            exit 1
          fi
          echo "✅ All required checks passed"

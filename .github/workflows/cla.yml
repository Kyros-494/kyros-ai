---
name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    name: CLA Signature Check
    runs-on: ubuntu-latest
    if: >-
      (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
      github.event_name == 'pull_request_target'
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "signatures/version1/cla.json"
          path-to-document: "https://github.com/${{ github.repository }}/blob/master/CLA.md"
          branch: "master"
          allowlist: dependabot[bot],github-actions[bot],renovate[bot]
          custom-notsigned-prcomment: |
            **Thank you for your contribution!** 🎉

            Before we can merge this PR, we need you to sign our **Contributor License Agreement (CLA)**.

            **To sign**, please comment below with exactly:

            > I have read the CLA Document and I hereby sign the CLA

            ---

            📄 [Read the full CLA](${{ github.event.repository.html_url }}/blob/master/CLA.md)

            This is a one-time process — once signed, all future contributions are covered.
          custom-allsigned-prcomment: |
            **All contributors have signed the CLA.** ✅ Thank you!

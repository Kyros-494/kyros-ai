# alembic.ini — Kyros database migration configuration
# The sqlalchemy.url is overridden at runtime by alembic/env.py using KYROS_DATABASE_URL.
# This value is only used as a fallback for offline migration generation.
# Set KYROS_DATABASE_URL in your environment instead of editing this file.
[alembic]
script_location = alembic
sqlalchemy.url = postgresql+asyncpg://kyros:%(POSTGRES_PASSWORD)s@localhost:5432/kyros
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
timezone = UTC
truncate_slug_length = 40

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
